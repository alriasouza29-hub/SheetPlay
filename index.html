<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Practice Highway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0e12; color: #f3f4f6; font-family: sans-serif; }
        .highway-lane { border-bottom: 1px solid #1e293b; position: relative; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">
        <div>
            <h1 id="trackTitle" class="text-xl font-bold text-emerald-400">Loading Decoded Data...</h1>
            <span id="trackMeta" class="text-xs text-slate-400">Run decode_sheet.py first</span>
        </div>
        
        <div class="flex items-center space-x-4">
            <button id="loadBtn" onclick="loadDecodedJson()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs text-white font-bold py-2 px-4 rounded-xl transition">
                <i class="fa-solid fa-sync mr-1.5"></i>Sync Python Output
            </button>
            <button id="micBtn" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold py-2 px-4 rounded-xl transition">
                <i class="fa-solid fa-microphone mr-1.5"></i>Connect Mic
            </button>
            <button id="playBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 text-xs font-bold py-2 px-5 rounded-xl transition">
                <i class="fa-solid fa-play mr-1.5"></i>Start Playalong
            </button>
        </div>
    </nav>

    <div class="flex-1 w-full bg-slate-950 relative flex items-center justify-center">
        <canvas id="highwayCanvas" class="w-full h-full bg-slate-950"></canvas>
        <div class="absolute left-[25%] top-0 bottom-0 w-1 bg-cyan-400/30 pointer-events-none shadow-lg"></div>
    </div>

    <div class="bg-slate-900 p-4 border-t border-slate-800 flex flex-col items-center">
        <div class="text-xs text-slate-400 mb-2 font-mono">Live Detected Note: <span id="liveNote" class="text-cyan-400 font-bold">-</span></div>
        <div id="piano" class="flex select-none"></div>
    </div>

    <script>
        const NOTE_COLORS = {"C": "#ef4444", "D": "#f59e0b", "E": "#84cc16", "F": "#10b981", "G": "#3b82f6", "A": "#8b5cf6", "B": "#f43f5e"};
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        let songData = null;
        let currentNoteIndex = 0;
        let isPlaying = false;
        let audioCtx = null;
        let playInterval = null;

        const canvas = document.getElementById('highwayCanvas');
        const ctx = canvas.getContext('2d');

        // Fetch the data exported by Python locally
        async function loadDecodedJson() {
            try {
                const response = await fetch('song_data.json');
                songData = await response.json();
                document.getElementById('trackTitle').innerText = songData.title;
                document.getElementById('trackMeta').innerText = `${songData.composer} • ${songData.notes.length} Notes Decoded`;
                currentNoteIndex = 0;
                drawHighway();
                renderPiano();
            } catch (err) {
                document.getElementById('trackTitle').innerText = "song_data.json Not Detected";
            }
        }

        function renderPiano() {
            const container = document.getElementById('piano');
            container.innerHTML = '';
            // Render basic keyboard register (MIDI 60 to 72)
            for (let m = 60; m <= 72; m++) {
                const isBlack = [1,3,6,8,10].includes(m % 12);
                const key = document.createElement('div');
                key.id = `key-${m}`;
                if (isBlack) {
                    key.className = "w-6 h-20 bg-slate-800 border border-black -mx-3 z-10 rounded-b";
                } else {
                    key.className = "w-10 h-32 bg-white border border-slate-300 rounded-b flex items-end justify-center pb-2 text-slate-400 text-xs font-mono font-bold";
                    key.innerText = NOTE_NAMES[m % 12];
                }
                container.appendChild(key);
            }
            highlightTargetKey();
        }

        function highlightTargetKey() {
            if (!songData || !songData.notes[currentNoteIndex]) return;
            // Clear keys
            for (let m = 60; m <= 72; m++) {
                const el = document.getElementById(`key-${m}`);
                if (el) el.style.backgroundColor = [1,3,6,8,10].includes(m % 12) ? '#1e293b' : '#ffffff';
            }
            const targetMidi = songData.notes[currentNoteIndex].midi;
            const keyEl = document.getElementById(`key-${targetMidi}`);
            if (keyEl) keyEl.style.backgroundColor = '#10b981'; // Green highlights note to hit
        }

        function drawHighway() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!songData) return;

            const targetLineX = canvas.width * 0.25;
            const spacingX = 120;
            const laneH = canvas.height / 12;

            // Draw lanes layout
            for(let i=0; i<12; i++) {
                ctx.strokeStyle = '#1e293b';
                ctx.beginPath(); ctx.moveTo(0, i * laneH); ctx.lineTo(canvas.width, i * laneH); ctx.stroke();
            }

            // Draw chronological notes scrolling
            songData.notes.forEach((note, idx) => {
                const xPos = targetLineX + ((idx - currentNoteIndex) * spacingX);
                const laneIdx = 11 - (note.midi % 12);
                const yPos = (laneIdx * laneH) + (laneH / 2);
                
                if (xPos > 0 && xPos < canvas.width) {
                    const baseName = note.name.replace(/[0-9]/, '');
                    ctx.fillStyle = NOTE_COLORS[baseName] || '#06b6d4';
                    ctx.beginPath();
                    ctx.roundRect(xPos - 30, yPos - 12, 60, 24, 6);
                    ctx.fill();

                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(note.name, xPos, yPos + 4);
                }
            });
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) {
                isPlaying = false;
                clearInterval(playInterval);
                document.getElementById('playBtn').innerText = "Start Playalong";
            } else {
                isPlaying = true;
                document.getElementById('playBtn').innerText = "Pause";
                playInterval = setInterval(() => {
                    if (songData && currentNoteIndex < songData.notes.length - 1) {
                        currentNoteIndex++;
                        drawHighway();
                        highlightTargetKey();
                    } else {
                        clearInterval(playInterval);
                        isPlaying = false;
                        currentNoteIndex = 0;
                        document.getElementById('playBtn').innerText = "Start Playalong";
                    }
                }, 1500);
            }
        });

        // Initialize Audio Context Microphone listener
        document.getElementById('micBtn').addEventListener('click', async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('micBtn').className = "bg-emerald-600 text-white text-xs font-bold py-2 px-4 rounded-xl";
                document.getElementById('micBtn').innerText = "Mic Active";
            } catch (err) {
                alert("Microphone connection failed.");
            }
        });

        window.onload = () => {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            loadDecodedJson();
        };
    </script>
</body>
</html>
